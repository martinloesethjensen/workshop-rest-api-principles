services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: todos
      POSTGRES_PASSWORD: todos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todos -d todos"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Spring Boot application ──────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: todos
      DB_USER: todos
      DB_PASSWORD: todos
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
